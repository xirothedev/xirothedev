name: "🐛 Bug Report"
description: Report a bug — something that's broken, crashes, or behaves incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.

        **Before submitting**, please:
        - [ ] Search [existing issues](../../issues) to avoid duplicates

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what's broken. Include error messages, tracebacks, or screenshots if relevant.
      placeholder: |
        What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug. The more specific, the faster we can fix it.
      placeholder: |
        1. Run `bun dev`
        2. Navigate to /path
        3. Click on X
        4. Error appears: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output if available.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the project is affected?
      multiple: true
      options:
        - Frontend (Next.js / React)
        - Backend (NestJS / FastAPI)
        - Database / Prisma
        - AI / LLM Integration
        - CI/CD / Workflows
        - Configuration / Setup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node/Bun version, browser (if frontend-related).
      placeholder: |
        OS: macOS 26.4 / Ubuntu 24.04 / Windows 11
        Runtime: Bun 1.3.x / Node 25.x
        Browser: Chrome 135 (if applicable)

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste relevant logs, stack traces, or error messages.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have searched existing issues and this is not a duplicate
