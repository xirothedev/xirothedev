name: "✨ Feature Request"
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Before submitting, please consider:

        - **Search [existing issues](../../issues)** — someone may have already proposed this.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve? What are you trying to do that you can't today?
      placeholder: |
        I'm trying to use this project for [workflow/use-case] but currently
        there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Be as specific as you can — CLI flags, config options, UI behavior.
      placeholder: |
        Add a feature that enables...
        Or: Add a config key that controls...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is the proposed solution better?

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New API endpoint / service
        - UI / UX improvement
        - CLI / Developer tooling
        - Configuration option
        - Performance / Reliability
        - AI / LLM integration
        - Developer experience (tests, docs, CI)
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - Small (single file, < 50 lines)
        - Medium (few files, < 300 lines)
        - Large (new module or significant refactor)

  - type: checkboxes
    id: pr-ready
    attributes:
      label: Contribution
      options:
        - label: I'd like to implement this myself and submit a PR

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have searched existing issues and this is not a duplicate
