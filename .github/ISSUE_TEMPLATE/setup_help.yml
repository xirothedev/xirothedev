name: "🔧 Setup / Installation Help"
description: Having trouble setting up the project? Ask here.
title: "[Setup]: "
labels: ["setup"]
body:
  - type: markdown
    attributes:
      value: |
        Sorry you're having trouble! Please fill out the details below so we can help.

        **Quick checks first:**
        - Run `bun install` to make sure dependencies are installed
        - Check the README for setup instructions
        - Make sure you're using a supported runtime (Bun or Node.js)

  - type: textarea
    id: description
    attributes:
      label: What's Going Wrong?
      description: Describe what you're trying to do and where it fails.
      placeholder: |
        I ran `bun install` and then `bun dev` but I get...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps Taken
      description: What did you do? Include the exact commands you ran.
      placeholder: |
        1. Cloned the repo
        2. Ran `bun install`
        3. Set up .env file
        4. Ran `bun dev` and got error...
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Git clone + bun install
        - GitHub template ("Use this template")
        - Manual setup
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Ubuntu 24.04 / macOS 15.2 / Windows 11
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime Version
      description: Output of `bun --version` or `node --version`
      placeholder: "1.3.12"

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste the full error message or terminal output.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have searched existing issues and this is not a duplicate
