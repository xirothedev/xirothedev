name: Contributor Attribution Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-attribution:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      BASE_REF: ${{ github.base_ref || 'main' }}
      KNOWN_CONTRIBUTOR_EMAILS: |
        lethanhtrung.trungle@gmail.com

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for unmapped contributor emails
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          MERGE_BASE="$(git merge-base "origin/${BASE_REF}" HEAD)"
          NEW_EMAILS="$(git log "${MERGE_BASE}..HEAD" --format='%ae' --no-merges | sort -u)"

          if [ -z "${NEW_EMAILS}" ]; then
            echo "No new commits to check."
            exit 0
          fi

          MISSING=""

          while IFS= read -r email; do
            case "${email}" in
              *noreply@github.com*|*dependabot*|*github-actions*)
                continue
                ;;
            esac

            if ! grep -Fxq "${email}" <<< "${KNOWN_CONTRIBUTOR_EMAILS}"; then
              author="$(git log --author="${email}" --format='%an' -1)"
              MISSING="${MISSING}"$'\n'"  ${email} (${author})"
            fi
          done <<< "${NEW_EMAILS}"

          if [ -n "${MISSING}" ]; then
            echo ""
            echo "Unmapped contributor email(s):"
            echo "${MISSING}"
            echo ""
            echo "Add each email to KNOWN_CONTRIBUTOR_EMAILS in .github/workflows/contributor-check.yml."
            exit 1
          fi

          echo "All contributor emails are mapped."
